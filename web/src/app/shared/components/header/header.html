<nav class="navbar navbar-expand-lg navbar-dark custom-navbar shadow-sm py-3">

          <path d="M5 3a3 3 0 0 1 6 0v5a3 3 0 0 1-6 0V3z"/>
          <path d="M3.5 6.5A.5.5 0 0 1 4 7v1a4 4 0 0 0 8 0V7a.5.5 0 0 1 1 0v1a5 5 0 0 1-4.5 4.975V15h3a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1h3v-2.025A5 5 0 0 1 3 8V7a.5.5 0 0 1 .5-.5z"/>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item mx-1">
          <a class="nav-link nav-btn d-inline-flex align-items-center" routerLink="/dashboard" routerLinkActive="active">

              <path d="M11 2a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1V2zm-5 2a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V4zm-5 4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v6a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V8z"/>
            </svg>
            Dashboard
          </a>
        </li>
        <li class="nav-item mx-1">
          <a class="nav-link nav-btn d-inline-flex align-items-center" routerLink="/admin" routerLinkActive="active">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-shield-lock-fill me-1" viewBox="0 0 16 16">

            </svg>
            Admin
          </a>
        </li>

        @if (user) {
          <li class="nav-item dropdown ms-lg-3 mt-2 mt-lg-0">
            <button class="btn dropdown-toggle avatar-btn d-flex align-items-center justify-content-center p-0" 
                    type="button" id="avatarDropdown" data-bs-toggle="dropdown" aria-expanded="false">
              <div class="avatar-circle">
                @if (user.photo) {
                  <img [src]="user.photo" class="avatar-img" alt="Avatar">
                } @else {
                  {{ getUserInitials() }}
                }
              </div>
            </button>
            <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark shadow border-0 mt-2 fade-in" aria-labelledby="avatarDropdown">
              <li class="dropdown-header text-indigo-light">
                Logged in as <strong class="text-white">{{ user.name }}</strong>
              </li>
              <li><hr class="dropdown-divider bg-secondary"></li>
              <li>
                <a class="dropdown-item d-flex align-items-center" routerLink="/dashboard/profile">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person-circle me-2" viewBox="0 0 16 16">
                    <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/>
                    <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1"/>
                  </svg>
                  My Profile
                </a>
              </li>
              <li><hr class="dropdown-divider bg-secondary"></li>
              <li>
                <button class="dropdown-item text-danger d-flex align-items-center" (click)="onLogout()">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-box-arrow-right me-2" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0z"/>
                    <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708z"/>
