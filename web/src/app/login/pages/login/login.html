<div class="auth-wrapper d-flex align-items-center justify-content-center py-5">
  <div class="container max-width-sm">
    
    <!-- BRAND / LOGO -->
    <div class="text-center mb-4">
      <div class="brand-logo-container mb-3 mx-auto">
        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" class="bi bi-mic-fill text-white" viewBox="0 0 16 16">
          <path d="M5 3a3 3 0 0 1 6 0v5a3 3 0 0 1-6 0V3z"/>
          <path d="M3.5 6.5A.5.5 0 0 1 4 7v1a4 4 0 0 0 8 0V7a.5.5 0 0 1 1 0v1a5 5 0 0 1-4.5 4.975V15h3a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1h3v-2.025A5 5 0 0 1 3 8V7a.5.5 0 0 1 .5-.5z"/>
        </svg>
      </div>
      <h3 class="fw-bold tracking-tight text-white mb-1">AI Interview Practice</h3>
      <p class="text-indigo-light small">Improve your skills with live AI mocks</p>
    </div>

    <!-- MAIN LOGIN CARD -->
    <div class="card border-0 shadow-lg rounded-4 overflow-hidden bg-glass-card">
      <form (ngSubmit)="onLogin()" #loginForm="ngForm" class="p-4 p-md-5">
        
        <h4 class="fw-bold mb-4 text-white text-center">Sign In</h4>

        <!-- ERROR MESSAGE -->
        @if (errorMessage()) {
          <div class="alert alert-danger border-0 rounded-3 shadow-sm py-2 px-3 mb-4 text-center small fade-in" role="alert">
            {{ errorMessage() }}
          </div>
        }

        <!-- EMAIL -->
        <div class="mb-3">
          <label for="emailid" class="form-label text-indigo-light small fw-medium">Email ID or Login ID <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 border-indigo-light">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person text-indigo-light" viewBox="0 0 16 16">
                <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/>
              </svg>
            </span>
            <input type="text" id="emailid" name="emailid" class="form-control bg-transparent border-start-0 border-indigo-light rounded-end-3 text-white" 
                   placeholder="Enter your Email ID or Login ID" required
                   [(ngModel)]="emailid" #emailCtrl="ngModel"
                   [class.is-invalid]="emailCtrl.invalid && emailCtrl.touched">
          </div>
          <div class="invalid-feedback text-danger-light">Email ID or Login ID is required.</div>
        </div>

        <!-- PASSWORD -->
        <div class="mb-4">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label for="password" class="form-label text-indigo-light small fw-medium mb-0">Password <span class="text-danger">*</span></label>
            <a routerLink="/auth/password-reset" class="text-indigo-link small text-decoration-none">Forgot Password?</a>
          </div>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 border-indigo-light">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-lock text-indigo-light" viewBox="0 0 16 16">
                <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2m3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zM5 8h6a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1"/>
              </svg>
            </span>
            <input type="password" id="password" name="password" class="form-control bg-transparent border-start-0 border-indigo-light rounded-end-3 text-white" 
                   placeholder="Enter your password" required 
                   [(ngModel)]="password" #passCtrl="ngModel"
                   [class.is-invalid]="passCtrl.invalid && passCtrl.touched">
          </div>
          <div class="invalid-feedback text-danger-light">Password is required.</div>
        </div>

        <!-- SUBMIT BUTTON -->
        <button type="submit" class="btn btn-indigo w-100 py-2.5 rounded-3 border-0 shadow-sm mb-4" 
                [disabled]="loginForm.invalid || submitting()">
          @if (submitting()) {
            <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            Signing In...
          } @else {
            Sign In
          }
        </button>

        <!-- REGISTER LINK -->
        <div class="text-center">
          <p class="text-indigo-light small mb-0">
            Don't have an account? 
            <a routerLink="/auth/signup" class="text-indigo-link fw-semibold text-decoration-none ms-1">Sign Up</a>
          </p>
        </div>

      </form>
    </div>

  </div>
</div>
