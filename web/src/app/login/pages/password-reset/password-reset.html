<div class="auth-wrapper d-flex align-items-center justify-content-center py-5">
  <div class="container max-width-sm">
    
    <!-- BRAND / LOGO -->
    <div class="text-center mb-4">
      <div class="brand-logo-container mb-3 mx-auto">
        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" class="bi bi-mic-fill text-white" viewBox="0 0 16 16">
          <path d="M5 3a3 3 0 0 1 6 0v5a3 3 0 0 1-6 0V3z"/>
          <path d="M3.5 6.5A.5.5 0 0 1 4 7v1a4 4 0 0 0 8 0V7a.5.5 0 0 1 1 0v1a5 5 0 0 1-4.5 4.975V15h3a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1h3v-2.025A5 5 0 0 1 3 8V7a.5.5 0 0 1 .5-.5z"/>
        </svg>
      </div>
      <h3 class="fw-bold tracking-tight text-white mb-1">AI Interview Practice</h3>
      <p class="text-indigo-light small">Improve your skills with live AI mocks</p>
    </div>

    <!-- MAIN RESET CARD -->
    <div class="card border-0 shadow-lg rounded-4 overflow-hidden bg-glass-card">
      <form (ngSubmit)="onResetPassword()" #resetForm="ngForm" class="p-4 p-md-5">
        
        <h4 class="fw-bold mb-4 text-white text-center">Reset Password</h4>

        <!-- ERROR MESSAGE -->
        @if (errorMessage()) {
          <div class="alert alert-danger border-0 rounded-3 shadow-sm py-2 px-3 mb-4 text-center small fade-in" role="alert">
            {{ errorMessage() }}
          </div>
        }

        <!-- SUCCESS MESSAGE -->
        @if (successMessage()) {
          <div class="alert alert-success border-0 rounded-3 shadow-sm py-2 px-3 mb-4 text-center small fade-in" role="alert">
            {{ successMessage() }}
          </div>
        }

        <!-- EMAIL -->
        <div class="mb-3">
          <label for="emailid" class="form-label text-indigo-light small fw-medium">Email ID <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 border-indigo-light">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-envelope text-indigo-light" viewBox="0 0 16 16">
                <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1zm13 2.383-4.708 2.825L15 11.105zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741zM1 11.105l4.708-2.897L1 5.383z"/>
              </svg>
            </span>
            <input type="email" id="emailid" name="emailid" class="form-control bg-transparent border-start-0 border-indigo-light rounded-end-3 text-white" 
                   placeholder="Enter your Email ID" required email
                   [(ngModel)]="emailid" #emailCtrl="ngModel"
                   [class.is-invalid]="emailCtrl.invalid && emailCtrl.touched">
          </div>
          <div class="invalid-feedback text-danger-light">Please enter a valid Email ID.</div>
        </div>

        <!-- NEW PASSWORD -->
        <div class="mb-4">
          <label for="newPassword" class="form-label text-indigo-light small fw-medium">New Password <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 border-indigo-light">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-lock text-indigo-light" viewBox="0 0 16 16">
                <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2m3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zM5 8h6a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1"/>
              </svg>
            </span>
            <input type="password" id="newPassword" name="newPassword" class="form-control bg-transparent border-start-0 border-indigo-light rounded-end-3 text-white" 
                   placeholder="Enter your new password" required minlength="6"
                   [(ngModel)]="newPassword" #passCtrl="ngModel"
                   [class.is-invalid]="passCtrl.invalid && passCtrl.touched">
          </div>
          <div class="invalid-feedback text-danger-light">New password must be at least 6 characters.</div>
        </div>

        <!-- SUBMIT BUTTON -->
        <button type="submit" class="btn btn-indigo w-100 py-2.5 rounded-3 border-0 shadow-sm mb-4" 
                [disabled]="resetForm.invalid || submitting()">
          @if (submitting()) {
            <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            Resetting Password...
          } @else {
            Reset Password
          }
        </button>

        <!-- LOGIN LINK -->
        <div class="text-center">
          <p class="text-indigo-light small mb-0">
            Remembered your password? 
            <a routerLink="/auth" class="text-indigo-link fw-semibold text-decoration-none ms-1">Sign In</a>
          </p>
        </div>

      </form>
    </div>

  </div>
</div>
